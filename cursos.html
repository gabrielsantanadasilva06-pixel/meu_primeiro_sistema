<!DOCTYPE html>
<html>

<head>
    <title>Cursos</title>
</head>

<body>

<h1>Cursos Disponíveis</h1>

<h2>Adicionar Curso</h2>

<form method="POST">

<input type="text" name="nome" placeholder="Nome do curso" required>

<button type="submit">Adicionar</button>

</form>

<a href="/">
<button>Voltar ao menu</button>
</a>

<hr>

<h2>Lista de Cursos</h2>

{% for curso in cursos %}

<p>{{ curso.nome }}</p>

{% endfor %}

</body>
</html>
